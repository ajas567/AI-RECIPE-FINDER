name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Create a fresh orphan branch with NO history (strips old zip from memory)
          git checkout --orphan deploy
          # Delete frontend and zip files before committing so Hugging Face gets a clean backend push!
          rm -rf frontend/
          rm -f *.zip
          git add -A
          git commit -m "Deploy to HF Spaces"
          git push --force https://ajas-km:$HF_TOKEN@huggingface.co/spaces/ajas-km/AI-Recipe-Backend deploy:main
